<div class="container pt-3 pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="feedback-card">
        <div class="feedback-header">
          <div class="header-icon">
            <i class="bi bi-chat-left-text"></i>
          </div>
          <div>
            <h3 class="header-title">Submit Feedback</h3>
            <p class="header-subtitle">Share clear, constructive feedback to help your team grow.</p>
          </div>
        </div>

        <form [formGroup]="feedbackForm" (ngSubmit)="onSubmit()" class="feedback-form">
          <div class="section-title">Recipient</div>

          <div class="mb-3 position-relative">
            <label class="form-label">Search Employee </label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input
                type="text"
                formControlName="searchEmployee"
                class="form-control"
                placeholder="Search by name or employee ID"
                (input)="onSearchChange($event)"
                autocomplete="off"
              />
            </div>

            <ul class="list-group search-results" *ngIf="filteredEmployees.length > 0">
              <li
                class="list-group-item list-group-item-action"
                *ngFor="let emp of filteredEmployees"
                (click)="selectEmployee(emp)"
              >
                <div class="d-flex align-items-center">
                  <div class="result-avatar me-2">{{ emp.name.charAt(0) }}</div>
                  <div>
                    <div class="fw-semibold">{{ emp.name }}</div>
                    <div class="text-muted small">ID: {{ emp.id }}</div>
                  </div>
                </div>
              </li>
            </ul>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Employee ID </label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                <input type="text" formControlName="employeeId" class="form-control" placeholder="ID" readonly>
              </div>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Category <span class="required-asterisk">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-tag"></i></span>
                <select formControlName="category" class="form-select">
                  <option value="" disabled>Select category</option>
                  <option *ngFor="let cat of categories" [value]="cat.name">{{ cat.name }}</option>
                </select>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Submission Date </label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
              <input type="date" formControlName="submissionDate" class="form-control">
            </div>
          </div>

          <div class="section-title">Feedback Details</div>

          <div class="mb-3">
            <label class="form-label">Comments </label>
            <textarea
              formControlName="comments"
              class="form-control"
              rows="4"
              placeholder="Write specific, actionable feedback..."
            ></textarea>
            <div *ngIf="feedbackForm.get('comments')?.touched && feedbackForm.get('comments')?.invalid"
              class="text-danger small mt-1">
              Comment must be at least 10 characters.
            </div>
          </div>

          <div class="anonymous-card" [ngClass]="feedbackForm.get('isAnonymous')?.value ? 'is-anon' : ''">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="anonSwitch" formControlName="isAnonymous">
              <label class="form-check-label" for="anonSwitch">Submit Anonymously</label>
            </div>
            <small class="text-muted d-block mt-1">
              <i class="bi bi-shield-lock-fill me-1"></i>Identity will be hidden from administrators.
            </small>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg" [disabled]="feedbackForm.invalid">
              <i class="bi bi-send me-2"></i>Submit Feedback
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
